<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio de Sesión</title>

    <!-- Materialize CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
      <!-- Favicon principal -->
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">

    <!-- Navegadores modernos (prefieren SVG) -->
    <link rel="icon" type="image/svg+xml" href="assets/images/qr-icon.svg">

    <!-- Ícono para móviles / PWA -->
    <link rel="apple-touch-icon" href="assets/images/icon-192.png">
</head>

  <body>
    <div class="container">
      <div class="row">
        <div class="col s12 m8 offset-m2 l6 offset-l3">
          <div class="card login-card">
            <div class="card-content">
              <div class="login-header">
                <i class="material-icons">lock</i>
                <h4>Iniciar Sesión</h4>
                <p class="grey-text">Accede a tu cuenta</p>
              </div>

              <!-- ================= LOGIN NORMAL ================= -->
              <div id="loginForm">
                <div class="input-field">
                  <i class="material-icons prefix">badge</i>
                  <input id="documento" type="text" />
                  <label for="documento">Documento</label>
                </div>

                <div class="input-field">
                  <i class="material-icons prefix">lock</i>
                  <input id="password" type="password" />
                  <label for="password">Contraseña</label>
                </div>

                <button class="btn waves-effect btn-login" onclick="login()">
                  Iniciar Sesión
                  <i class="material-icons right">send</i>
                </button>

                <div class="divider-text">
                  <span>o continúa con</span>
                </div>

                <button class="btn waves-effect btn-qr" onclick="abrirQR()">
                  <i class="material-icons left">qr_code_2</i>
                  Iniciar con Código QR
                </button>
              </div>

              <!-- ================= LOGIN QR (PISTOLA) ================= -->
              <div id="qrSection" class="hidden">
                <p class="center grey-text">
                  Escanee el código QR con la pistola
                </p>

                <!-- INPUT OCULTO -->
                <input
                  type="text"
                  id="qr_input"
                  autocomplete="off"
                  autofocus
                  style="position: absolute; left: -9999px"
                />

                <button class="btn waves-effect btn-qr" onclick="cerrarQR()">
                  <i class="material-icons left">arrow_back</i>
                  Volver
                </button>
              </div>

              <div id="message"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Materialize JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <script>
      /* ================= INIT ================= */
      document.addEventListener("DOMContentLoaded", () => {
        M.updateTextFields();
      });

      /* ================= LOGIN NORMAL ================= */
      function login() {
        const documento = document.getElementById("documento").value.trim();
        const password = document.getElementById("password").value.trim();
        const msg = document.getElementById("message");

        if (!documento || !password) {
          mostrarMensaje("Completa todos los campos", "red");
          return;
        }

        fetch("/SII-IETSN/api/auth/login.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ documento, password }),
        })
          .then((r) => r.json())
          .then((r) => {
            if (r.success) {
              mostrarMensaje(
                `Bienvenido ${r.data.nombre} ${r.data.apellido}`,
                "green",
              );
              setTimeout(() => (location.href = "dashboard.php"), 1200);
            } else {
              mostrarMensaje(r.message, "red");
            }
          })
          .catch(() => {
            mostrarMensaje("Error de conexión", "red");
          });
      }

      /* ================= QR MODE ================= */
      function abrirQR() {
        loginForm.classList.add("hidden");
        qrSection.classList.remove("hidden");

        message.style.display = "none";

        setTimeout(() => {
          qr_input.value = "";
          qr_input.focus();
        }, 100);
      }

      function cerrarQR() {
        qrSection.classList.add("hidden");
        loginForm.classList.remove("hidden");
      }

      /* ================= PISTOLA (ENTER) ================= */
      qr_input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const token = qr_input.value.trim();
          procesarQR(token);
        }
      });

      /* ================= PROCESAR QR ================= */
      function procesarQR(doc_hash) {
        if (!doc_hash || doc_hash.length < 32) {
          mostrarMensaje("QR inválido", "red");
          return;
        }

        fetch("/SII-IETSN/api/auth/login_qr.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ doc_hash }),
        })
          .then((r) => r.json())
          .then((r) => {
            if (r.success) {
              mostrarMensaje(
                `Bienvenido ${r.data.nombre} ${r.data.apellido}`,
                "green",
              );
              setTimeout(() => (location.href = "dashboard.php"), 1000);
            } else {
              mostrarMensaje(r.message, "red");
              qr_input.value = "";
              qr_input.focus();
            }
          });
      }

      /* ================= HELPERS ================= */
      function mostrarMensaje(texto, color) {
        message.style.display = "block";
        message.className = `${color} lighten-4 ${color}-text text-darken-4`;
        message.innerHTML = `<i class="material-icons left">${color === "green" ? "check_circle" : "error"}</i>${texto}`;
      }

      /* ================= SHORTCUT ================= */
      document.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && !loginForm.classList.contains("hidden")) {
          login();
        }
      });
    </script>
  </body>
</html>
